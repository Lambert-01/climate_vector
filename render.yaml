services:
  - type: web
    name: rcvis-api
    runtime: python
    plan: free
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: uvicorn app.main:app --app-dir apps/api --host 0.0.0.0 --port $PORT
    envVars:
      - key: PROJECT_ENV
        value: production
      - key: PROJECT_NAME
        value: DengueEW-GL
      - key: API_CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SYNC_URL
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: OPERATOR_API_KEY
        sync: false
