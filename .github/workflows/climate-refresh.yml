name: Scheduled climate ingestion
on:
  schedule:
    - cron: "35 3 * * *"
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r apps/api/requirements.txt
      - name: Refresh district weather context
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SYNC_URL: ${{ secrets.DATABASE_SYNC_URL }}
          PROJECT_ENV: production
        run: python scripts/pipelines/18_refresh_open_meteo_climate.py
